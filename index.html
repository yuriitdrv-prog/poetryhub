<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoetryHub | yuriitdrv Stream Tools</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #252525; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        
        h1 { font-size: 1.5rem; color: #e67e22; margin-bottom: 5px; }
        .channel-name { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; }
        input { background: #333; color: white; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #d35400; }

        #chat-container { flex-grow: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .poem-box { background: #333; padding: 15px; margin-top: 20px; border-radius: 8px; font-style: italic; font-size: 0.9rem; border-left: 4px solid #e67e22; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>PoetryHub</h1>
    <div class="channel-name">Stream: yuriitdrv</div>
    
    <label>Current Video ID:</label>
    <input type="text" id="videoId" placeholder="Enter YouTube Video ID...">
    <button onclick="loadChat()">Connect Chat</button>

    <hr style="width:100%; border: 0.5px solid #444; margin: 20px 0;">

    <h3>Stream Poetry</h3>
    <p style="font-size: 0.8rem; color: #aaa;">Click to generate a poem to read or paste into chat:</p>
    <div class="poem-box" id="poem-display">"Press the button to get a random verse..."</div>
    <button onclick="generatePoem()" style="background: #2980b9;">New Poem</button>
</div>

<div id="main-content">
    <div id="chat-container">
        <div style="padding: 50px; text-align: center; color: #555;">
            Enter your YouTube Video ID and click "Connect Chat" to start.
        </div>
    </div>
</div>

<script>
    function loadChat() {
        const vId = document.getElementById('videoId').value;
        const domain = "poetryhub.xyz"; // Your domain
        if(!vId) { alert("Please enter a Video ID"); return; }
        
        const chatUrl = `https://www.youtube.com/live_chat?v=${vId}&embed_domain=${domain}`;
        document.getElementById('chat-container').innerHTML = `<iframe src="${chatUrl}"></iframe>`;
    }

    const poems = [
        "The stars are but a dream away, in the quiet of the night.",
        "A single leaf falls, yet the forest remains unchanged.",
        "Words are the arrows, but silence is the bow.",
        "The ocean hums a song that only the moon understands."
    ];

    function generatePoem() {
        const random = poems[Math.floor(Math.random() * poems.length)];
        document.getElementById('poem-display').innerText = `"${random}"`;
    }
</script>

</body>
</html>
