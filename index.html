<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoetryHub | Stream Overlay</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; font-family: sans-serif; }
        
        /* Dashboard UI - hidden in Overlay Mode */
        #ui-wrapper { display: flex; height: 100vh; background: #121212; color: white; }
        #sidebar { width: 300px; padding: 20px; background: #1e1e1e; border-right: 1px solid #333; }
        
        /* The Chat Container */
        #chat-container { flex-grow: 1; background: transparent; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Helper Classes */
        .hidden { display: none !important; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #e67e22; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-wrapper">
    <div id="sidebar" id="config-sidebar">
        <h2 style="color:#e67e22">PoetryHub</h2>
        <p style="font-size: 0.8rem; color: #888;">yuriitdrv Stream Tools</p>
        
        <label>YouTube Video ID:</label>
        <input type="text" id="videoId" placeholder="e.g. 7hP9R_0f8Y8">
        <button onclick="updateView()">LAUNCH OVERLAY</button>
        
        <div style="margin-top: 20px; font-size: 0.8rem; color: #aaa;">
            <strong>OBS Link:</strong><br>
            <code id="obs-link">poetryhub.xyz/?v=YOUR_ID</code>
        </div>
    </div>

    <div id="chat-container">
        </div>
</div>

<script>
    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function loadChat(vId) {
        const hostName = window.location.hostname;
        const chatUrl = `https://www.youtube.com/live_chat?v=${vId}&embed_domain=${hostName}&dark_theme=1`;
        document.getElementById('chat-container').innerHTML = `<iframe src="${chatUrl}"></iframe>`;
    }

    function updateView() {
        const vId = document.getElementById('videoId').value;
        if(vId) window.location.search = `?v=${vId}`;
    }

    // AUTO-DETECT MODE
    const videoIdParam = getParam('v');
    if (videoIdParam) {
        // OVERLAY MODE: Hide the sidebar
        document.getElementById('sidebar').classList.add('hidden');
        loadChat(videoIdParam);
    } else {
        // DASHBOARD MODE: Show instructions
        document.getElementById('chat-container').innerHTML = `<div style="padding:40px; color:#444">Enter Video ID to preview chat...</div>`;
    }
</script>

</body>
</html>
